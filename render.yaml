services:
  # ------------------------------------------------------------------
  # BACKEND SERVICE (GO)
  # ------------------------------------------------------------------
  - type: web
    name: loopaffi-backend
    runtime: docker
    rootDir: loopaffi-backend
    plan: free
    envVars:
      - key: GIN_MODE
        value: release
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: loopaffi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "*" # Bisa diganti dengan URL frontend setelah deploy (misal: https://loopaffi-frontend.onrender.com)

  # ------------------------------------------------------------------
  # FRONTEND SERVICE (NEXT.JS)
  # ------------------------------------------------------------------
  - type: web
    name: loopaffi-frontend
    runtime: node
    rootDir: loopaffi-app
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://loopaffi-backend.onrender.com/api # Sesuaikan jika nama service backend di Render berbeda

databases:
  # ------------------------------------------------------------------
  # DATABASE SERVICE (POSTGRESQL)
  # ------------------------------------------------------------------
  - name: loopaffi-db
    databaseName: loopaffi_db
    user: loopaffi_admin
    plan: free
